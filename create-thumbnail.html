<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moru Doll Social Thumbnail</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }
        
        .thumbnail {
            width: 1200px;
            height: 630px;
            background: linear-gradient(160deg, #fff0f5 0%, #ffd6e0 50%, #ffe4ec 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .content {
            text-align: center;
            z-index: 10;
            max-width: 800px;
            padding: 40px;
        }
        
        .logo {
            font-family: 'Pacifico', cursive;
            font-size: 4rem;
            color: #e05c8a;
            text-shadow: 3px 3px 0 rgba(255,143,171,0.3);
            margin-bottom: 20px;
        }
        
        .tagline {
            font-size: 1.8rem;
            color: #3d2c2c;
            font-weight: 700;
            margin-bottom: 15px;
        }
        
        .description {
            font-size: 1.3rem;
            color: #9e7b7b;
            font-weight: 600;
            margin-bottom: 25px;
        }
        
        .location {
            background: rgba(255,255,255,0.8);
            border: 2px solid #ffd6e0;
            border-radius: 50px;
            padding: 8px 25px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #e05c8a;
            display: inline-block;
        }
        
        .decorations {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        
        .emoji {
            position: absolute;
            font-size: 3rem;
            opacity: 0.4;
        }
        
        .emoji1 { top: 10%; left: 8%; }
        .emoji2 { top: 15%; right: 10%; }
        .emoji3 { bottom: 20%; left: 12%; }
        .emoji4 { bottom: 15%; right: 8%; }
        .emoji5 { top: 50%; left: 5%; }
        .emoji6 { top: 45%; right: 5%; }
    </style>
</head>
<body>
    <div class="thumbnail">
        <div class="decorations">
            <div class="emoji emoji1">🐻</div>
            <div class="emoji emoji2">🐰</div>
            <div class="emoji emoji3">🎀</div>
            <div class="emoji emoji4">🎁</div>
            <div class="emoji emoji5">🧸</div>
            <div class="emoji emoji6">🌸</div>
        </div>
        
        <div class="content">
            <div class="logo">Moru Doll 🐻</div>
            <div class="tagline">Handmade Doll Bag Charms & Gift Sets</div>
            <div class="description">Cute handmade dolls made just for you 🐰🧸</div>
            <div class="location">📍 Bandung, Indonesia</div>
        </div>
    </div>
</body>
</html>
